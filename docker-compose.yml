services:
  api:
    build: backend
    container_name: kenya_farm_api
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///data/app.db
      REDIS_URL: redis://redis:6379/0
      CACHE_BACKEND: redis
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173
      ALLOWED_HOSTS: localhost,127.0.0.1,api,0.0.0.0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: kenya_farm_frontend
    ports:
      - "3000:3000"
    environment:
      API_INTERNAL_BASE_URL: http://api:8000
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kenya_farm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  sqlite_data:
  redis_data:
