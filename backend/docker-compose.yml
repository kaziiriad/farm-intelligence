services:
  api:
    build: .
    container_name: kenya_farm_api
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///data/app.db
      REDIS_URL: redis://redis:6379/0
      CACHE_BACKEND: redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kenya_farm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  sqlite_data:
  redis_data: